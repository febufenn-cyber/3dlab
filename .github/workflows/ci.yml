# CPU-only CI (GitHub Actions free minutes — GPU stages are exercised on real
# hardware per QUALITY.md).
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install packages
        run: |
          python -m pip install -U pip
          pip install -e "pipeline[dev]" -e "api[dev]" pytest-asyncio
      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Pipeline tests
        run: python -m pytest pipeline/tests -q
      - name: API tests
        run: python -m pytest api/tests -q
      - name: Frozen schema self-check
        run: rf-scene schema > /dev/null
      - name: Validate design sheets against STANDARD.md
        run: python tools/validate.py designs

  viewer-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - name: Install and build rf.js
        working-directory: viewer
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: PLY → ksplat converter integration test
        run: |
          pip install numpy pydantic
          python - <<'EOF'
          import sys
          sys.path.insert(0, "pipeline")
          import numpy as np
          from sceneforge_pipeline.splat_export import write_gsplat_ply
          rng = np.random.default_rng(1)
          n = 500
          write_gsplat_ply(
              "/tmp/t.ply",
              means=rng.normal(0, 1, (n, 3)), scales_log=rng.normal(-3, .3, (n, 3)),
              quats=rng.normal(size=(n, 4)), opacities_logit=rng.normal(1, 1, (n,)),
              sh0=rng.normal(0, .5, (n, 1, 3)), shN=rng.normal(0, .1, (n, 8, 3)),
          )
          EOF
          node viewer/tools/convert-to-ksplat.mjs /tmp/t.ply /tmp/t.ksplat 1 1 2
          # load-back check runs from viewer/ so ESM resolves node_modules
          cd viewer && node -e "
          globalThis.window = globalThis;
          import('@mkkellogg/gaussian-splats-3d').then(async GS => {
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/t.ksplat');
            const b = await GS.KSplatLoader.loadFromFileData(
              raw.buffer.slice(raw.byteOffset, raw.byteOffset + raw.byteLength));
            const n = b.getSplatCount();
            if (n !== 500) { console.error('expected 500 splats, got', n); process.exit(1); }
            console.log('ksplat round-trip OK:', n, 'splats');
          });
          "
