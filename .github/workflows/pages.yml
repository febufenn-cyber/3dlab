# Publish the viewer demo + rf.js to GitHub Pages (free static hosting per
# the zero-cost constraint). Publishes by pushing the built site to the
# `gh-pages` branch — creating that branch auto-enables Pages in
# deploy-from-branch mode on public repos, so no one ever has to touch repo
# settings (the previous deploy-pages-API mechanism 404'd until a manual
# Settings → Pages toggle; see docs/RUNBOOK.md).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # push to gh-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - name: Build rf.js
        working-directory: viewer
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r viewer/app site/app
          cp -r viewer/demo site/demo
          cp -r viewer/dist site/dist
          touch site/.nojekyll
          # Front door is the app (2D experience; vision.html sits beside it).
          # Path layout mirrors viewer/ so ../dist and ../demo work unchanged.
          cat > site/index.html <<'EOF'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=app/">
          <title>SceneForge</title></head>
          <body><a href="app/">SceneForge</a></body></html>
          EOF
      - name: Publish to gh-pages
        run: |
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy site from ${GITHUB_SHA}"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages:refs/heads/gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
